<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enerji Takip Sistemi</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <nav>
        <div class="logo">⚡ Enerji Paneli</div>

        <ul>
            <li><a href="#anasayfa">Ana Sayfa</a></li>
            <li><a href="#veri">Veriler</a></li>
            <li><a href="#rapor">Rapor</a></li>
            <li><a href="#iletisim">İletişim</a></li>
        </ul>

        <button id="temaBtn">🌙</button>
    </nav>

    <header id="anasayfa">
        <h1>Enerji Tüketim Dashboard</h1>
        <p id="saat"></p>
    </header>

    <section class="cards">

        <div class="card">Günlük<br><b>32 kWh</b></div>
        <div class="card">Aylık<br><b>960 kWh</b></div>
        <div class="card">Tasarruf<br><b>%18</b></div>
        <div class="card">Maliyet<br><b>2400 TL</b></div>

    </section>

    <section id="veri" class="panel">
        <h2>Enerji Grafiği</h2>
        <canvas id="chart1"></canvas>
    </section>

    <section class="panel">
        <h2>Maliyet Grafiği</h2>
        <canvas id="chart2"></canvas>
    </section>

    <section id="rapor" class="panel">
        <h2>Rapor</h2>
        <p>Enerji tüketim raporunu indirebilirsiniz.</p>
        <button onclick="raporIndir()">📄 İndir</button>
    </section>

    <section id="iletisim" class="panel">
        <h2>İletişim</h2>

        <input type="text" placeholder="Ad Soyad">
        <input type="email" placeholder="E-posta">
<textarea placeholder="Mesaj"></textarea>

        <button>Gönder</button>
    </section>

    <footer>
        2025 Enerji Takip Sistemi
    </footer>

    <script src="script.js"></script>
</body>
</html>
